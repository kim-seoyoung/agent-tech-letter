name: send

# Triggered when a draft PR is merged into main.
# CRITICAL: the `if:` predicate below MUST include
# `github.event.pull_request.merged == true` so the workflow only fires
# on actual merges, NOT on close-without-merge events.
# This is the single most important guard in the project (TC0179).

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual backfill / re-send for a specific issue. Use when the
  # PR-merge run failed (missing config, transient channel error)
  # and the same content needs to ship without re-merging.
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Issue ID to (re)send, e.g. issue-2026-05-29'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: send-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  send:
    # TC0179 — the load-bearing predicate. Do NOT remove or weaken.
    # workflow_dispatch is an explicit human trigger, so it bypasses
    # the merge gate; the pull_request branch still requires merged==true.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SLACK_WEBHOOK_URLS: ${{ secrets.SLACK_WEBHOOK_URLS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout main (post-merge state)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Detect draft path
        id: draft
        env:
          DISPATCH_ISSUE_ID: ${{ inputs.issue_id }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_ID="$DISPATCH_ISSUE_ID"
            DRAFT="drafts/${ISSUE_ID}.md"
            if [ ! -f "$DRAFT" ]; then
              echo "::error::draft file not found at $DRAFT"
              exit 1
            fi
          else
            # Find the most recent draft file added by the merged PR
            DRAFT=$(git diff --name-only HEAD^ HEAD -- 'drafts/*.md' | head -1)
            if [ -z "$DRAFT" ]; then
              echo "::error::No draft file found in merged PR diff"
              exit 1
            fi
            ISSUE_ID=$(basename "$DRAFT" .md)
          fi
          echo "draft_path=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"

      - name: Materialize subscribers.yaml from secret
        env:
          SUBSCRIBERS_B64: ${{ secrets.SUBSCRIBERS_YAML }}
        run: |
          if [ -z "$SUBSCRIBERS_B64" ]; then
            echo "::error::SUBSCRIBERS_YAML secret is empty or unset"
            exit 1
          fi
          printf '%s' "$SUBSCRIBERS_B64" | base64 -d > config/subscribers.yaml

      - name: Send to channels
        run: |
          uv run techletter send \
            --issue "${{ steps.draft.outputs.issue_id }}" \
            --draft-path "${{ steps.draft.outputs.draft_path }}"

      - name: Commit sends.jsonl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # logs/sends.jsonl이 처음 만들어지는 경우(untracked)도 잡으려면
          # git diff(추적 변경)만으로는 부족하고, staged 상태로 한 번 끌어와서
          # --cached로 확인해야 함.
          git add -A logs/sends.jsonl
          if git diff --cached --quiet -- logs/sends.jsonl; then
            echo "No new audit log entries to commit"
            exit 0
          fi
          git config user.name "techletter-bot"
          git config user.email "bot@techletter.local"
          git commit -m "audit: send for ${{ steps.draft.outputs.issue_id }}"
          git pull --rebase origin main
          git push origin main
