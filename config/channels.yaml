# Per-channel enable flags. Schema: techletter/delivery/config.py :: ChannelsConfig
# Subscribers live in config/subscribers.yaml (gitignored).

email:
  enabled: true

slack:
  enabled: false

telegram:
  enabled: true
  mode: teaser_link              # publish HTML to GitHub Pages, send teaser+link to Telegram
  publisher: github_pages

publishers:
  github_pages:
    enabled: true
    repo_path: "."
    branch: "gh-pages"
    base_url: "https://kim-seoyoung.github.io/agent-tech-letter"
    author_name: "tech-letter-bot"
    author_email: "bestseo02@gmail.com"
